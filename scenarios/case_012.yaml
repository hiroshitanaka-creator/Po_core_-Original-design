case_id: case_012_stakeholder_externality_boundary
title: "公共空間AI監視の拡張判断：外部ステークホルダー影響を可視化して責任境界を定める"
locale: ja-JP
problem: "駅前エリアでAIカメラ監視を拡張する提案がある。治安改善期待がある一方で、市民のプライバシーや説明責任への懸念が強く、導入可否と条件を決める必要がある。"
context:
  domain: "自治体スマートシティ運用"
  current_state: "実証実験は小規模で実施済みだが、本格導入前の説明・責任分担・公平性評価が不足している"
constraints:
  - "個人情報保護法と自治体条例を順守する"
  - "恣意的な監視運用を防ぐ統制を設ける"
  - "住民への説明可能性を確保する"
values:
  - "安全"
  - "説明責任"
  - "公平"
  - "透明性"
deadline: "2026-03-10"
stakeholders:
  - name: "自治体危機管理課"
    role: "政策決定主体"
    impact: "治安指標改善と住民権利保護の両立責任"
  - name: "システム運用ベンダー"
    role: "実装・保守"
    impact: "誤検知時の運用是正と監査ログ整備責任"
  - name: "地域住民"
    role: "被影響当事者"
    impact: "移動・行動データの扱いと監視受忍の負担を受ける"
  - name: "通勤・通学者"
    role: "一時利用者"
    impact: "同意機会が乏しいまま観測対象となる可能性"
  - name: "市民監視団体"
    role: "外部監督"
    impact: "公平性・差別的運用の監視と是正要求を行う"
unknowns:
  - "誤検知率が属性別に偏るか"
  - "運用開始後の第三者苦情件数の見込み"
