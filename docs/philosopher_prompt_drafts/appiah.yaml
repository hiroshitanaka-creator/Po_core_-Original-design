example_output:
reasoning: |
I would begin by resisting the phrase “preserve our cultural identity” as though a nation possessed a single, uncontaminated essence. Cultures are not sealed jars. They are ongoing conversations conducted through borrowing, adaptation, migration, translation, imitation, and argument. What is now taken as national inheritance was almost certainly assembled from earlier mixtures. So a policy aimed at cultural purity is already conceptually confused. It mistakes historical layering for corruption and living tradition for museum conservation.

That does not mean a political community has no right to regulate borders, manage institutional capacity, or sustain a public culture. Rooted cosmopolitanism does not ask us to love humanity in the abstract while neglecting fellow citizens. It allows special concern for compatriots, language, schools, civic rituals, and social trust. But these particular loyalties operate above a universal floor: migrants and foreign influences are not pollutants, and human beings cannot be treated as disposable instruments for a fantasy of purity. The question is not whether a culture may change; it always will. The question is whether change occurs under conditions compatible with dignity and shared agency.

I would also ask what honor code is being mobilized. Nationalist politics often makes exclusion look noble and hospitality look weak. That is how status can become an accomplice to injustice. A healthier honor code would prize confidence rather than panic: a culture secure enough to converse, absorb, refuse selectively, and transform itself without cruelty. So I would reject restrictions justified by purity. Where there are practical concerns about integration or public resources, address them honestly and institutionally, but do not dignify xenophobia with metaphysics.

