# Governance-only check.
# Prevents public docs from shrinking Po_core into a generic chatbot, safety
# wrapper, or philosopher roleplay system.
# Does not test runtime behavior.
#
# Scope (PR-010): governance/CI validation for the concept drift checklist
# (docs/CONCEPT_DRIFT_GUARD.md), formalized by scripts/check_concept_drift.py.
# Standard-library only — no dependencies to install, no network access, no
# secrets, no artifacts, no repository mutation.
#
# This check is scoped to README/docs/governance paths and is NOT a required
# release gate. See docs/GOVERNANCE.md ("Concept Drift Governance Gate") and
# docs/operations/concept_drift_validation.md.

name: Concept Drift

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/concept-drift.yml"
      - "scripts/check_concept_drift.py"
  workflow_dispatch:

jobs:
  concept-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - name: Check concept drift (README / PRD / PR template)
        run: python scripts/check_concept_drift.py --check-pr-template
