# This workflow validates trace continuity contracts only.
# It does not test runtime behavior or enforce full release readiness.
#
# Scope (PR-009): governance/CI validation for the PR-008 trace continuity
# contract (docs/contracts/TRACE_CONTINUITY_V1.md). It runs
# TraceContinuityValidator against the example trace chains under
# examples/contracts/ and the validator's own unit tests. It never installs
# or exercises Po_core / Po_self / Viewer / reconstruction-executor runtime
# dependencies (torch, transformers, etc.) — only jsonschema + pytest.
#
# This check is scoped to trace-related paths and is NOT a required release
# gate. See docs/GOVERNANCE.md ("Trace Continuity Gate") and
# docs/operations/trace_continuity_validation.md.

name: Trace Continuity

on:
  pull_request:
    paths:
      - "src/po_core_original/trace.py"
      - "src/po_core_original/trace_validation/**"
      - "src/po_core_original/self_controller/**"
      - "schemas/po_trace_event_v1.schema.json"
      - "docs/contracts/PO_TRACE_EVENT_V1.md"
      - "docs/contracts/TRACE_CONTINUITY_V1.md"
      - "examples/contracts/trace_chain*.json"
      - "scripts/validate_trace_continuity.py"
      - ".github/workflows/trace-continuity.yml"
  workflow_dispatch:

jobs:
  trace-continuity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - name: Install minimal dependencies
        # po_core_original has no dependency on po_core / torch / transformers
        # / etc. Only jsonschema (schema validation) and pytest are needed.
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pytest
      - name: Validate trace continuity examples (valid + negative fixtures)
        run: python scripts/validate_trace_continuity.py --include-negative
      - name: Run trace continuity validator tests
        run: python -m pytest tests/test_trace_continuity_validator.py -v
