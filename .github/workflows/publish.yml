name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  publish-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      deployments: read
    outputs:
      publish_target: ${{ steps.guard.outputs.publish_target }}
      publish_allowed: ${{ steps.guard.outputs.publish_allowed }}
      package_version: ${{ steps.guard.outputs.package_version }}
      ref_kind: ${{ steps.guard.outputs.ref_kind }}
      ref_name: ${{ steps.guard.outputs.ref_name }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0
      - name: Guard publish source provenance
        id: guard
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REF="${GITHUB_REF}"
          SHA="${GITHUB_SHA}"
          EVENT="${GITHUB_EVENT_NAME}"
          TARGET="${{ github.event.inputs.target || '' }}"
          PACKAGE_VERSION="$(python - <<'PY'
          from pathlib import Path
          import re

          init_py = Path('src/po_core/__init__.py').read_text(encoding='utf-8')
          match = re.search(r'__version__ = "([^"]+)"', init_py)
          if match is None:
              raise SystemExit('ERROR: Could not read package version from src/po_core/__init__.py')
          print(match.group(1))
          PY
          )"

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$EVENT" = "release" ]; then
            TARGET="pypi"
          fi
          echo "publish_target=$TARGET" >> "$GITHUB_OUTPUT"

          if [ "$REF" = "refs/heads/main" ]; then
            REF_KIND="main"
            REF_NAME="main"
          elif [[ "$REF" =~ ^refs/tags/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            REF_KIND="tag"
            REF_NAME="${BASH_REMATCH[1]}"
          else
            echo "publish_allowed=false" >> "$GITHUB_OUTPUT"
            echo "ERROR: Publish is allowed only from refs/heads/main or refs/tags/vX.Y.Z. Current ref: $REF" >&2
            exit 1
          fi

          echo "ref_kind=$REF_KIND" >> "$GITHUB_OUTPUT"
          echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"

          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main

          if ! git merge-base --is-ancestor "$SHA" "origin/main"; then
            echo "publish_allowed=false" >> "$GITHUB_OUTPUT"
            if [ "$REF_KIND" = "tag" ]; then
              echo "ERROR: Tagged commit $SHA is not reachable from origin/main. Ref: $REF_NAME" >&2
            else
              echo "ERROR: Commit $SHA is not reachable from origin/main. Ref: $REF_NAME" >&2
            fi
            exit 1
          fi

          if [ "$REF_KIND" = "tag" ]; then
            TAG_VERSION="${REF_NAME#v}"
            if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
              echo "publish_allowed=false" >> "$GITHUB_OUTPUT"
              echo "ERROR: Tag version $REF_NAME does not match package version $PACKAGE_VERSION from src/po_core/__init__.py" >&2
              exit 1
            fi
          fi

          if [ "$TARGET" = "pypi" ]; then
            python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          api_base = os.environ.get("GITHUB_API_URL", "https://api.github.com")

          def api_json(url: str) -> object:
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(request) as response:
                      return json.load(response)
              except urllib.error.HTTPError as exc:  # pragma: no cover - executed in GitHub Actions
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise SystemExit(
                      "ERROR: Unable to verify TestPyPI deployment prerequisite via GitHub API. "
                      f"HTTP {exc.code}: {detail}"
                  ) from exc

          deployments_url = (
              f"{api_base}/repos/{repo}/deployments?"
              + urllib.parse.urlencode(
                  {
                      "sha": sha,
                      "environment": "testpypi",
                      "per_page": 100,
                  }
              )
          )
          deployments = api_json(deployments_url)
          if not isinstance(deployments, list):
              raise SystemExit(
                  "ERROR: Unable to verify TestPyPI deployment prerequisite; deployments API returned an unexpected payload."
              )
          if not deployments:
              raise SystemExit(
                  "ERROR: PyPI publish requires a prior successful TestPyPI deployment for this exact commit SHA. No testpypi deployment exists for "
                  f"{sha}. Run workflow_dispatch with target=testpypi first."
              )

          successful_deployment = None
          for deployment in deployments:
              deployment_id = deployment.get("id")
              if deployment_id is None:
                  continue
              statuses = api_json(
                  f"{api_base}/repos/{repo}/deployments/{deployment_id}/statuses?per_page=100"
              )
              if not isinstance(statuses, list):
                  continue
              if any(status.get("state") == "success" for status in statuses):
                  successful_deployment = deployment_id
                  break

          if successful_deployment is None:
              raise SystemExit(
                  "ERROR: PyPI publish requires a successful TestPyPI deployment status for this exact commit SHA. "
                  f"Found testpypi deployment record(s) for {sha}, but none reached success."
              )

          print(
              "Verified TestPyPI deployment prerequisite via deployment id "
              f"{successful_deployment} for commit {sha}."
          )
          PY
          fi

          echo "publish_allowed=true" >> "$GITHUB_OUTPUT"

  verify-release-blockers:
    runs-on: ubuntu-latest
    needs: publish-guard
    if: needs.publish-guard.outputs.publish_allowed == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        artifact-type: ['wheel', 'sdist']
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit pip-audit build twine
      - name: Run must-pass release blockers
        shell: bash
        run: |
          set -euo pipefail

          audit_surface() {
            surface_name="$1"
            extras_spec="$2"
            venv_dir=".audit-${surface_name}"
            python -m venv "${venv_dir}"
            . "${venv_dir}/bin/activate"
            python -m pip install --upgrade pip
            python -m pip install pip-audit
            if [ -n "${extras_spec}" ]; then
              python -m pip install -e ".[${extras_spec}]"
            else
              python -m pip install -e .
            fi
            pip-audit
            deactivate
            rm -rf "${venv_dir}"
          }

          python tools/import_graph.py --check --print
          pytest tests/test_release_readiness.py -v
          pytest tests/acceptance/ -v -m acceptance
          pytest tests/test_output_schema.py -v
          pytest tests/test_golden_e2e.py tests/test_input_schema.py -v
          pytest tests/ -v -m "not slow"
          bandit -r src/ scripts/ -c pyproject.toml -ll
          audit_surface base ""
          audit_surface llm "llm"
          audit_surface docs "docs"
          audit_surface viz "viz"
          python -m build
          twine check dist/*
      - name: Smoke built artifact in clean virtualenv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          if [ "${{ matrix.artifact-type }}" = "wheel" ]; then
            python -m pip install dist/*.whl
          else
            python -m pip install dist/*.tar.gz
          fi
          python -c "import po_core; print(po_core.__version__)"
          python scripts/release_smoke.py --check-entrypoints
      - name: Upload verified dist artifacts
        if: matrix.python-version == '3.12' && matrix.artifact-type == 'wheel'
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [publish-guard, verify-release-blockers]
    if: github.event_name == 'workflow_dispatch' && needs.publish-guard.outputs.publish_target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/po-core-flyingpig
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: false
          skip_existing: false
          verbose: true

  publish-pypi:
    name: Publish to PyPI
    needs: [publish-guard, verify-release-blockers]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && needs.publish-guard.outputs.publish_target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/po-core-flyingpig
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
