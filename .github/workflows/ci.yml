name: CI

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mypy==1.11.2
      - name: Show mypy version
        run: mypy --version
      - name: Lint with flake8
        run: |
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
      - name: Check code formatting with black
        run: black --check src tests
      - name: Check import sorting with isort
        run: isort --check-only src tests
      - name: Type check with mypy (core + runtime + safety)
        run: >-
          mypy
          src/po_core/domain/
          src/po_core/experiments/
          src/po_core/app/
          src/po_core/ports/
          src/po_core/runtime/
          src/po_core/safety/
      # Phase-2 expansion (tensors, philosophers) is tracked below as an
      # informational (non-blocking) lint so drift becomes visible before it
      # is enforced.
      - name: Type check with mypy (tensors + philosophers — informational)
        continue-on-error: true
        run: >-
          mypy
          src/po_core/tensors/
          src/po_core/philosophers/

  must-pass-tests:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run schema and golden contract gates
        run: |
          pytest tests/test_output_schema.py -v
          pytest tests/test_golden_e2e.py tests/test_input_schema.py -v
      - name: Run acceptance contract gate
        run: pytest tests/acceptance/ -v -m acceptance
      - name: Run release readiness checks
        run: pytest tests/test_release_readiness.py -v

  full-suite:
    runs-on: ubuntu-latest
    needs: must-pass-tests
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run traceability config lock check
        run: python scripts/update_traceability.py --check
      - name: Run acceptance coverage gate
        run: python scripts/calc_traceability_coverage.py --min-at 8
      - name: Run full test suite
        run: pytest tests/ -v -m "not slow" --cov=po_core --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7b7d8f03f1aff725d7f98d6bc0edd9d9a96c
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install bandit pip-audit
      - name: Security check with bandit
        run: bandit -r src/ scripts/ -c pyproject.toml -ll
      - name: Release lock reproducibility check
        # When a release lock file is committed, ensure it still matches the
        # declared runtime dependencies.  Non-release builds skip this step
        # gracefully so day-to-day development is unaffected.
        shell: bash
        run: |
          set -euo pipefail
          if [ -f requirements-release.lock ]; then
            python -m pip install --upgrade pip
            pip install pip-tools
            tmpfile=$(mktemp)
            pip-compile \
              --generate-hashes \
              --output-file="${tmpfile}" \
              --resolver=backtracking \
              --strip-extras \
              --quiet \
              requirements.txt
            # Strip pip-compile header (contains timestamps) before diffing.
            diff <(grep -v '^#' requirements-release.lock | sort) \
                 <(grep -v '^#' "${tmpfile}" | sort) \
              || (echo '::error::requirements-release.lock is out of date. Run tools/generate_release_lock.sh and commit the result.' && exit 1)
          else
            echo 'No requirements-release.lock committed; skipping reproducibility check.'
          fi
      - name: Dependency vulnerability audit across base and optional extras
        shell: bash
        run: |
          set -euo pipefail
          audit_surface() {
            surface_name="$1"
            extras_spec="$2"
            venv_dir=".audit-${surface_name}"
            python -m venv "${venv_dir}"
            . "${venv_dir}/bin/activate"
            python -m pip install --upgrade pip
            python -m pip install pip-audit
            if [ -n "${extras_spec}" ]; then
              python -m pip install -e ".[${extras_spec}]"
            else
              python -m pip install -e .
            fi
            pip-audit
            deactivate
            rm -rf "${venv_dir}"
          }

          audit_surface base ""
          audit_surface llm "llm"
          audit_surface docs "docs"
          audit_surface viz "viz"

  build:
    runs-on: ubuntu-latest
    needs: [full-suite, security]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build package
        run: python -m build
      - name: Check package
        run: twine check dist/*
      - name: Upload dist artifacts
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: dist
          path: dist/

  installed-artifact-smoke:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        artifact-type: ['wheel', 'sdist']
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Download dist artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: dist
          path: dist/
      - name: Install artifact in clean virtualenv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          if [ "${{ matrix.artifact-type }}" = "wheel" ]; then
            python -m pip install dist/*.whl
          else
            python -m pip install dist/*.tar.gz
          fi
          python -c "import po_core; print(po_core.__version__)"
          python scripts/release_smoke.py --check-entrypoints
